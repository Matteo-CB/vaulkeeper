name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  text-lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run text lint
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          powershell -ExecutionPolicy Bypass -File scripts/lint-text.ps1

  build:
    runs-on: windows-latest
    needs: text-lint
    strategy:
      fail-fast: false
      matrix:
        preset: [msvc-debug, msvc-relwithdebinfo]
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Setup Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 5e6578b62d9e4ac5a563e816802a56818540cd2e
      - name: Configure
        shell: pwsh
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg
        run: |
          cmake --preset ${{ matrix.preset }}
      - name: Build
        shell: pwsh
        run: |
          cmake --build --preset ${{ matrix.preset }}
      - name: Run tests
        if: matrix.preset != 'msvc-release'
        shell: pwsh
        run: |
          ctest --preset ${{ matrix.preset }} --output-on-failure
      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/**/*.log
